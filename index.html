<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeSpace - социальная сеть</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            overflow-x: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Светлая тема */
        :root {
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --text-primary: #333333;
            --text-secondary: #666666;
            --border-color: #dddddd;
            --card-bg: #f9f9f9;
            --hover-bg: #f0f0f0;
            --shadow-color: rgba(0,0,0,0.1);
            --gradient-start: #f093fb;
            --gradient-end: #f5576c;
            --input-bg: #ffffff;
            --sidebar-bg: #ffffff;
            --content-bg: #ffffff;
            --header-bg: #ffffff;
            --auth-card-bg: rgba(255, 255, 255, 0.95);
            --message-sent: linear-gradient(45deg, #f093fb, #f5576c);
            --message-received: #f0f0f0;
            --check-color: #4CAF50;
        }

        /* Темная тема */
        body.dark-theme {
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --border-color: #333333;
            --card-bg: #2d2d2d;
            --hover-bg: #3d3d3d;
            --shadow-color: rgba(0,0,0,0.3);
            --gradient-start: #bb86fc;
            --gradient-end: #cf6679;
            --input-bg: #2d2d2d;
            --sidebar-bg: #1e1e1e;
            --content-bg: #1e1e1e;
            --header-bg: #1e1e1e;
            --auth-card-bg: rgba(30, 30, 30, 0.95);
            --message-sent: linear-gradient(45deg, #bb86fc, #cf6679);
            --message-received: #2d2d2d;
            --check-color: #81c784;
        }

        body.dark-theme input {
            color: var(--text-primary);
            background: var(--input-bg);
        }

        body.dark-theme .auth-card {
            background: var(--auth-card-bg);
        }

        /* КРАСИВЫЙ ФОН */
        .auth-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .auth-card {
            background: var(--auth-card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px var(--shadow-color);
            width: 450px;
            backdrop-filter: blur(10px);
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .site-title {
            text-align: center;
            font-size: 48px;
            background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .site-subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: var(--hover-bg);
            cursor: pointer;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
            color: var(--text-primary);
        }

        .tab-btn.active {
            background: linear-gradient(45deg, var(--gradient-start), var(--gradient-end));
            color: white;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .input-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
            background: var(--input-bg);
            color: var(--text-primary);
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--gradient-end);
            box-shadow: 0 0 0 3px rgba(245,87,108,0.1);
        }

        .auth-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--gradient-start), var(--gradient-end));
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s;
            margin-bottom: 10px;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
        }

        .auth-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .hidden {
            display: none !important;
        }

        .auth-message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
        }

        /* ОСНОВНОЙ ИНТЕРФЕЙС */
        .main-app {
            min-height: 100vh;
            background: var(--bg-primary);
            transition: background-color 0.3s;
        }

        .app-header {
            background: var(--header-bg);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 10px var(--shadow-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(45deg, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-container {
            flex: 0.5;
            position: relative;
        }

        .search-container i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .search-container input {
            width: 100%;
            padding: 10px 10px 10px 40px;
            border: 1px solid var(--border-color);
            border-radius: 25px;
            font-size: 14px;
            background: var(--input-bg);
            color: var(--text-primary);
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--text-primary);
        }

        .logout-btn {
            background: none;
            border: none;
            font-size: 20px;
            color: var(--gradient-end);
            cursor: pointer;
        }

        .app-container {
            display: flex;
            padding: 20px;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .sidebar {
            flex: 0 0 200px;
            background: var(--sidebar-bg);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 2px 10px var(--shadow-color);
            height: fit-content;
            position: sticky;
            top: 80px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar li {
            padding: 12px 15px;
            margin-bottom: 5px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-primary);
        }

        .sidebar li:hover {
            background: var(--hover-bg);
        }

        .sidebar li.active {
            background: linear-gradient(45deg, var(--gradient-start), var(--gradient-end));
            color: white;
        }

        .theme-toggle {
            padding: 12px 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-primary);
            margin-top: auto;
            border: none;
            background: none;
            width: 100%;
            font-size: 16px;
        }

        .theme-toggle:hover {
            background: var(--hover-bg);
        }

        .content-area {
            flex: 1;
            background: var(--content-bg);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 2px 10px var(--shadow-color);
            min-height: 500px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* ПРОФИЛЬ */
        .profile-header {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }

        .profile-avatar {
            position: relative;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            overflow: hidden;
            cursor: pointer;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .profile-avatar:hover .avatar-overlay {
            opacity: 1;
        }

        .avatar-overlay i {
            color: white;
            font-size: 30px;
        }

        .avatar-overlay input {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .reset-avatar-btn {
            position: absolute;
            bottom: 0;
            right: 0;
            background: linear-gradient(45deg, var(--gradient-start), var(--gradient-end));
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
        }

        .profile-info h2 {
            font-size: 28px;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .profile-info p {
            color: var(--text-secondary);
            margin-bottom: 15px;
        }

        .edit-profile-btn {
            padding: 10px 20px;
            background: linear-gradient(45deg, var(--gradient-start), var(--gradient-end));
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
        }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .post-card {
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 5px var(--shadow-color);
            position: relative;
        }

        .delete-post-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255,255,255,0.8);
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #f5576c;
            z-index: 10;
        }

        .post-card img, .post-card video {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .post-actions {
            padding: 10px;
            display: flex;
            gap: 15px;
        }

        .post-actions button {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .post-actions button.liked {
            color: var(--gradient-end);
        }

        .comments-section {
            padding: 10px;
            border-top: 1px solid var(--border-color);
        }

        .comments-section p {
            color: var(--text-primary);
            font-size: 14px;
            margin-bottom: 5px;
        }

        .comment-input {
            display: flex;
            gap: 5px;
            margin-top: 10px;
        }

        .comment-input input {
            flex: 1;
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: var(--input-bg);
            color: var(--text-primary);
        }

        .comment-input button {
            padding: 8px 12px;
            background: linear-gradient(45deg, var(--gradient-start), var(--gradient-end));
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }

        /* МУЗЫКА */
        .music-search {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .music-search input {
            flex: 1;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 16px;
            background: var(--input-bg);
            color: var(--text-primary);
        }

        .music-search button {
            padding: 15px 30px;
            background: linear-gradient(45deg, var(--gradient-start), var(--gradient-end));
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
        }

        .music-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .music-card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 15px;
            color: var(--text-primary);
        }

        .music-card iframe {
            width: 100%;
            height: 166px;
            border: none;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .music-info h4 {
            margin-bottom: 5px;
        }

        .music-info p {
            color: var(--text-secondary);
            font-size: 12px;
        }

        /* ЧАТЫ */
        .chats-container {
            display: flex;
            gap: 20px;
            height: 600px;
        }

        .chats-list {
            flex: 0 0 300px;
            border-right: 1px solid var(--border-color);
            padding-right: 20px;
            overflow-y: auto;
        }

        .chat-item {
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.3s;
            margin-bottom: 5px;
            color: var(--text-primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-item:hover {
            background: var(--hover-bg);
        }

        .chat-item.active {
            background: linear-gradient(45deg, var(--gradient-start)20, var(--gradient-end)20);
        }

        .unread-badge {
            background: var(--gradient-end);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .chat-messages {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message-wrapper {
            max-width: 70%;
            position: relative;
        }

        .message-wrapper.sent {
            align-self: flex-end;
        }

        .message-wrapper.received {
            align-self: flex-start;
        }

        .message {
            padding: 10px 15px;
            border-radius: 18px;
            word-wrap: break-word;
            position: relative;
        }

        .message.sent {
            background: var(--message-sent);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received {
            background: var(--message-received);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }

        .message-status {
            font-size: 12px;
            margin-top: 2px;
            display: flex;
            justify-content: flex-end;
            gap: 2px;
        }

        .message-status i {
            color: var(--check-color);
        }

        .message-status i.grey {
            color: #999;
        }

        .delete-message-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--gradient-end);
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .message-wrapper:hover .delete-message-btn {
            opacity: 1;
        }

        .message-input {
            display: flex;
            gap: 10px;
            padding: 15px 0 0 0;
            border-top: 1px solid var(--border-color);
        }

        .message-input input {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 25px;
            background: var(--input-bg);
            color: var(--text-primary);
        }

        .message-input button {
            padding: 12px 25px;
            background: linear-gradient(45deg, var(--gradient-start), var(--gradient-end));
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
        }

        /* ДРУЗЬЯ */
        .friends-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .friend-card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            color: var(--text-primary);
        }

        .friend-card img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 10px;
            object-fit: cover;
        }

        .friend-card h4 {
            margin-bottom: 5px;
        }

        .friend-card p {
            color: var(--text-secondary);
            font-size: 12px;
            margin-bottom: 10px;
        }

        .friend-actions {
            display: flex;
            gap: 5px;
            justify-content: center;
        }

        .friend-actions button {
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        .message-btn {
            background: #4CAF50;
            color: white;
        }

        /* ЧУЖОЙ ПРОФИЛЬ */
        .user-profile-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .user-profile-content {
            background: var(--content-bg);
            padding: 30px;
            border-radius: 20px;
            width: 600px;
            max-width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .user-profile-header {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .user-profile-header img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-profile-header h2 {
            color: var(--text-primary);
        }

        .user-profile-header p {
            color: var(--text-secondary);
        }

        .close-btn {
            float: right;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }

        .user-posts {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <!-- ЭКРАН ВХОДА -->
    <div id="authScreen" class="auth-screen">
        <div class="auth-card">
            <h1 class="site-title">VibeSpace</h1>
            <p class="site-subtitle">Твое пространство для музыки и общения</p>
            
            <div class="auth-tabs">
                <button class="tab-btn active" id="loginTab">Вход</button>
                <button class="tab-btn" id="registerTab">Регистрация</button>
            </div>

            <!-- ВХОД -->
            <div id="loginForm" class="auth-form active">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="loginUsername" placeholder="Логин или никнейм">
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPassword" placeholder="Пароль">
                </div>
                <button class="auth-btn" id="loginBtn">Войти</button>
                <div class="auth-message" id="loginMessage"></div>
            </div>

            <!-- РЕГИСТРАЦИЯ -->
            <div id="registerForm" class="auth-form">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="regEmail" placeholder="Электронная почта">
                </div>
                <div class="input-group">
                    <i class="fas fa-user-tag"></i>
                    <input type="text" id="regNickname" placeholder="Никнейм">
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="regPassword" placeholder="Пароль">
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="regConfirmPassword" placeholder="Подтвердите пароль">
                </div>
                <button class="auth-btn" id="sendCodeBtn">Отправить код на почту</button>
                
                <!-- Код подтверждения -->
                <div id="codeVerification" class="hidden">
                    <div class="input-group">
                        <i class="fas fa-key"></i>
                        <input type="text" id="verificationCode" placeholder="Введите код из письма">
                    </div>
                    <button class="auth-btn" id="verifyCodeBtn">Подтвердить код</button>
                </div>
                <div class="auth-message" id="registerMessage"></div>
            </div>
        </div>
    </div>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
    <div id="mainApp" class="main-app hidden">
        <header class="app-header">
            <div class="logo">VibeSpace</div>
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Поиск по никнейму...">
            </div>
            <div class="user-menu">
                <span id="currentUserNickname"></span>
                <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <div class="app-container">
            <!-- Боковое меню -->
            <nav class="sidebar">
                <ul>
                    <li class="active" data-tab="profile"><i class="fas fa-user"></i> Профиль</li>
                    <li data-tab="music"><i class="fas fa-headphones-alt"></i> Музыка</li>
                    <li data-tab="chats"><i class="fas fa-comments"></i> Чаты</li>
                    <li data-tab="friends"><i class="fas fa-user-friends"></i> Друзья</li>
                </ul>
                <!-- Кнопка темы -->
                <button class="theme-toggle" id="themeToggle">
                    <i class="fas fa-moon"></i>
                    <span>Темная тема</span>
                </button>
            </nav>

            <!-- Контент -->
            <div class="content-area">
                <!-- ПРОФИЛЬ -->
                <div id="profileTab" class="tab-content active">
                    <div class="profile-header">
                        <div class="profile-avatar">
                            <img id="profileAvatar" src="https://via.placeholder.com/150" alt="Avatar">
                            <div class="avatar-overlay">
                                <i class="fas fa-camera"></i>
                                <input type="file" id="avatarUpload" accept="image/*">
                            </div>
                            <button class="reset-avatar-btn" id="resetAvatarBtn" title="Сбросить аватар"><i class="fas fa-times"></i></button>
                        </div>
                        <div class="profile-info">
                            <h2 id="profileNickname"></h2>
                            <p id="profileEmail"></p>
                            <button id="editProfileBtn" class="edit-profile-btn">Редактировать профиль</button>
                        </div>
                    </div>

                    <!-- Публикации -->
                    <h3>Мои публикации</h3>
                    <div class="posts-grid" id="myPosts"></div>
                    
                    <!-- Добавить пост -->
                    <div style="margin-top: 30px;">
                        <h4>Добавить публикацию</h4>
                        <input type="file" id="postMedia" accept="image/*,video/*">
                        <button id="addPostBtn" class="auth-btn" style="margin-top: 10px;">Опубликовать</button>
                    </div>
                </div>

                <!-- МУЗЫКА -->
                <div id="musicTab" class="tab-content">
                    <h2>Поиск музыки на SoundCloud</h2>
                    <div class="music-search">
                        <input type="text" id="musicSearchInput" placeholder="Введите название песни или исполнителя...">
                        <button id="searchMusicBtn"><i class="fas fa-search"></i> Найти</button>
                    </div>
                    <div class="music-grid" id="musicGrid">
                        <!-- Здесь будут треки -->
                    </div>
                </div>

                <!-- ЧАТЫ -->
                <div id="chatsTab" class="tab-content">
                    <div class="chats-container">
                        <div class="chats-list" id="chatsList">
                            <!-- Список чатов -->
                        </div>
                        <div class="chat-messages" id="activeChat">
                            <div class="messages-area" id="messagesArea"></div>
                            <div class="message-input">
                                <input type="text" id="messageInput" placeholder="Введите сообщение...">
                                <button id="sendMessageBtn">Отправить</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ДРУЗЬЯ -->
                <div id="friendsTab" class="tab-content">
                    <h2>Мои друзья</h2>
                    <div class="friends-list" id="friendsList"></div>
                    
                    <h3 style="margin-top: 30px;">Добавить друга</h3>
                    <div class="input-group">
                        <i class="fas fa-user-plus"></i>
                        <input type="text" id="addFriendInput" placeholder="Введите никнейм друга">
                    </div>
                    <button id="addFriendBtn" class="auth-btn">Добавить друга</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== ВАШ BIN ID ==========
        const BIN_ID = '69b5c750c3097a1dd526116e';
        const API_KEY = '$2a$10$W0vSAJE8VUY053PasJTV.uwHAuCndJkE4k8WyfLlwy4a15O.JQ7Qq'; // Ваш ключ

        // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
        let currentUser = null;
        let currentChatFriend = null;

        // ========== ФУНКЦИИ ДЛЯ РАБОТЫ С JSONBIN ==========
        async function loadData() {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: {
                        'X-Master-Key': API_KEY
                    }
                });
                const data = await response.json();
                return data.record;
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                return { users: [], posts: [], messages: {} };
            }
        }

        async function saveData(data) {
            try {
                await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': API_KEY
                    },
                    body: JSON.stringify(data)
                });
            } catch (error) {
                console.error('Ошибка сохранения:', error);
            }
        }

        // ========== ТЕМНАЯ ТЕМА ==========
        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-theme');
            updateThemeButton(true);
        }

        document.getElementById('themeToggle').addEventListener('click', function() {
            if (document.body.classList.contains('dark-theme')) {
                document.body.classList.remove('dark-theme');
                localStorage.setItem('theme', 'light');
                updateThemeButton(false);
            } else {
                document.body.classList.add('dark-theme');
                localStorage.setItem('theme', 'dark');
                updateThemeButton(true);
            }
        });

        function updateThemeButton(isDark) {
            const btn = document.getElementById('themeToggle');
            const icon = btn.querySelector('i');
            const span = btn.querySelector('span');
            
            if (isDark) {
                icon.className = 'fas fa-sun';
                span.textContent = 'Светлая тема';
            } else {
                icon.className = 'fas fa-moon';
                span.textContent = 'Темная тема';
            }
        }

        // ========== ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ==========
        document.querySelectorAll('.sidebar li').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.sidebar li').forEach(li => li.classList.remove('active'));
                this.classList.add('active');
                
                document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
                document.getElementById(this.dataset.tab + 'Tab').classList.add('active');
                
                if (this.dataset.tab === 'music') loadMusic();
                if (this.dataset.tab === 'chats' && currentUser) loadChats();
                if (this.dataset.tab === 'friends' && currentUser) loadFriends();
            });
        });

        // ========== ПЕРЕКЛЮЧЕНИЕ ФОРМ ==========
        document.getElementById('loginTab').addEventListener('click', function() {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            this.classList.add('active');
            document.getElementById('loginForm').classList.add('active');
            document.getElementById('registerForm').classList.remove('active');
        });

        document.getElementById('registerTab').addEventListener('click', function() {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            this.classList.add('active');
            document.getElementById('registerForm').classList.add('active');
            document.getElementById('loginForm').classList.remove('active');
        });

        // ========== РЕГИСТРАЦИЯ ==========
        document.getElementById('sendCodeBtn').addEventListener('click', async function() {
            const email = document.getElementById('regEmail').value;
            const nickname = document.getElementById('regNickname').value;
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;
            
            if (!email || !nickname || !password) {
                alert('Заполните все поля');
                return;
            }
            
            if (password !== confirm) {
                alert('Пароли не совпадают');
                return;
            }
            
            const data = await loadData();
            
            if (data.users.find(u => u.nickname === nickname)) {
                alert('Никнейм уже занят');
                return;
            }
            
            // Генерируем код
            const code = Math.floor(1000 + Math.random() * 9000);
            
            // Сохраняем данные временно
            sessionStorage.setItem('regData', JSON.stringify({
                email, nickname, password, code
            }));
            
            alert(`Ваш код подтверждения: ${code}`);
            document.getElementById('codeVerification').classList.remove('hidden');
        });

        // ========== ПОДТВЕРЖДЕНИЕ КОДА ==========
        document.getElementById('verifyCodeBtn').addEventListener('click', async function() {
            const inputCode = document.getElementById('verificationCode').value;
            const regData = JSON.parse(sessionStorage.getItem('regData'));
            
            if (regData && regData.code == inputCode) {
                const data = await loadData();
                
                // Создаем пользователя
                const newUser = {
                    id: Date.now(),
                    email: regData.email,
                    nickname: regData.nickname,
                    password: regData.password,
                    avatar: 'https://via.placeholder.com/150',
                    friends: []
                };
                
                data.users.push(newUser);
                await saveData(data);
                
                currentUser = newUser;
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                showMainApp();
                loadUserData();
                sessionStorage.removeItem('regData');
            } else {
                alert('Неверный код');
            }
        });

        // ========== ВХОД ==========
        document.getElementById('loginBtn').addEventListener('click', async function() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            const data = await loadData();
            const user = data.users.find(u => (u.nickname === username || u.email === username) && u.password === password);
            
            if (user) {
                currentUser = user;
                localStorage.setItem('currentUser', JSON.stringify(user));
                showMainApp();
                loadUserData();
            } else {
                alert('Неверный логин или пароль');
            }
        });

        // ========== ВЫХОД ==========
        document.getElementById('logoutBtn').addEventListener('click', function() {
            currentUser = null;
            localStorage.removeItem('currentUser');
            document.getElementById('authScreen').style.display = 'flex';
            document.getElementById('mainApp').classList.add('hidden');
        });

        // ========== ЗАГРУЗКА ДАННЫХ ==========
        function showMainApp() {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('mainApp').classList.remove('hidden');
        }

        function loadUserData() {
            document.getElementById('profileNickname').textContent = currentUser.nickname;
            document.getElementById('profileEmail').textContent = currentUser.email;
            document.getElementById('profileAvatar').src = currentUser.avatar || 'https://via.placeholder.com/150';
            document.getElementById('currentUserNickname').textContent = currentUser.nickname;
            
            loadMyPosts();
        }

        // ========== АВАТАР ==========
        document.getElementById('avatarUpload').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = async function(event) {
                    document.getElementById('profileAvatar').src = event.target.result;
                    
                    const data = await loadData();
                    const userIndex = data.users.findIndex(u => u.id === currentUser.id);
                    if (userIndex !== -1) {
                        data.users[userIndex].avatar = event.target.result;
                        await saveData(data);
                    }
                    
                    currentUser.avatar = event.target.result;
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                };
                reader.readAsDataURL(file);
            }
        });

        // ========== СБРОС АВАТАРА ==========
        document.getElementById('resetAvatarBtn').addEventListener('click', async function() {
            const defaultAvatar = 'https://via.placeholder.com/150';
            document.getElementById('profileAvatar').src = defaultAvatar;
            
            const data = await loadData();
            const userIndex = data.users.findIndex(u => u.id === currentUser.id);
            if (userIndex !== -1) {
                data.users[userIndex].avatar = defaultAvatar;
                await saveData(data);
            }
            
            currentUser.avatar = defaultAvatar;
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
        });

        // ========== ПУБЛИКАЦИИ ==========
        document.getElementById('addPostBtn').addEventListener('click', function() {
            const fileInput = document.getElementById('postMedia');
            if (fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = async function(event) {
                    const data = await loadData();
                    
                    const newPost = {
                        id: Date.now(),
                        userId: currentUser.id,
                        userNickname: currentUser.nickname,
                        userAvatar: currentUser.avatar,
                        media: event.target.result,
                        type: fileInput.files[0].type.startsWith('video') ? 'video' : 'image',
                        likes: [],
                        comments: []
                    };
                    
                    data.posts.push(newPost);
                    await saveData(data);
                    loadMyPosts();
                };
                reader.readAsDataURL(fileInput.files[0]);
            }
        });

        async function loadMyPosts() {
            const data = await loadData();
            const myPosts = data.posts.filter(p => p.userId === currentUser.id);
            const container = document.getElementById('myPosts');
            container.innerHTML = '';
            
            myPosts.sort((a, b) => b.id - a.id).forEach(post => {
                const postEl = document.createElement('div');
                postEl.className = 'post-card';
                
                let mediaHtml = '';
                if (post.type === 'video') {
                    mediaHtml = `<video src="${post.media}" controls></video>`;
                } else {
                    mediaHtml = `<img src="${post.media}" alt="Post">`;
                }
                
                postEl.innerHTML = `
                    <button class="delete-post-btn" onclick="deletePost(${post.id})"><i class="fas fa-times"></i></button>
                    ${mediaHtml}
                    <div class="post-actions">
                        <button class="like-btn ${post.likes && post.likes.includes(currentUser.id) ? 'liked' : ''}" data-id="${post.id}">
                            <i class="fas fa-heart"></i> ${post.likes ? post.likes.length : 0}
                        </button>
                        <button><i class="fas fa-comment"></i> ${post.comments ? post.comments.length : 0}</button>
                    </div>
                    <div class="comments-section" id="comments-${post.id}">
                        ${post.comments ? post.comments.map(c => `<p><b>${c.user}:</b> ${c.text}</p>`).join('') : ''}
                        <div class="comment-input">
                            <input type="text" placeholder="Комментарий..." id="comment-${post.id}">
                            <button onclick="addComment(${post.id})">OK</button>
                        </div>
                    </div>
                `;
                
                container.appendChild(postEl);
            });
            
            // Лайки
            document.querySelectorAll('.like-btn').forEach(btn => {
                btn.addEventListener('click', async function() {
                    const postId = Number(this.dataset.id);
                    const data = await loadData();
                    const post = data.posts.find(p => p.id === postId);
                    
                    if (post.likes.includes(currentUser.id)) {
                        post.likes = post.likes.filter(id => id !== currentUser.id);
                    } else {
                        post.likes.push(currentUser.id);
                    }
                    
                    await saveData(data);
                    loadMyPosts();
                });
            });
        }

        // ========== УДАЛЕНИЕ ПУБЛИКАЦИИ ==========
        window.deletePost = async function(postId) {
            if (confirm('Удалить публикацию?')) {
                const data = await loadData();
                data.posts = data.posts.filter(p => p.id !== postId);
                await saveData(data);
                loadMyPosts();
            }
        };

        // ========== КОММЕНТАРИИ ==========
        window.addComment = async function(postId) {
            const input = document.getElementById(`comment-${postId}`);
            const text = input.value.trim();
            
            if (text) {
                const data = await loadData();
                const post = data.posts.find(p => p.id === postId);
                
                if (!post.comments) post.comments = [];
                post.comments.push({
                    user: currentUser.nickname,
                    text: text,
                    date: new Date().toISOString()
                });
                
                await saveData(data);
                input.value = '';
                loadMyPosts();
            }
        };

        // ========== МУЗЫКА ==========
        document.getElementById('searchMusicBtn').addEventListener('click', function() {
            const query = document.getElementById('musicSearchInput').value;
            if (query) {
                searchMusic(query);
            }
        });

        function searchMusic(query) {
            const grid = document.getElementById('musicGrid');
            grid.innerHTML = '<p>Поиск...</p>';
            
            setTimeout(() => {
                grid.innerHTML = '';
                const demoTracks = [
                    { title: 'Lo-Fi Beats', artist: 'Dreamer', id: '293' },
                    { title: 'Chill Vibes', artist: 'Sunset', id: '294' },
                    { title: 'Study Session', artist: 'Focus', id: '295' },
                    { title: 'Night Drive', artist: 'Neon', id: '296' },
                    { title: 'Rainy Day', artist: 'Lofi Girl', id: '297' },
                    { title: 'Summer Breeze', artist: 'Coastal', id: '298' }
                ];
                
                demoTracks.forEach(track => {
                    grid.innerHTML += `
                        <div class="music-card">
                            <iframe src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/${track.id}&auto_play=false&show_artwork=true&color=%23f5576c"></iframe>
                            <div class="music-info">
                                <h4>${track.title}</h4>
                                <p>${track.artist}</p>
                            </div>
                        </div>
                    `;
                });
            }, 500);
        }

        function loadMusic() {
            if (document.getElementById('musicGrid').children.length === 0) {
                searchMusic('popular');
            }
        }

        // ========== ДРУЗЬЯ ==========
        document.getElementById('addFriendBtn').addEventListener('click', async function() {
            const nickname = document.getElementById('addFriendInput').value;
            const data = await loadData();
            const friend = data.users.find(u => u.nickname === nickname && u.id !== currentUser.id);
            
            if (friend) {
                if (!currentUser.friends.includes(friend.id)) {
                    currentUser.friends.push(friend.id);
                    
                    const userIndex = data.users.findIndex(u => u.id === currentUser.id);
                    if (userIndex !== -1) {
                        data.users[userIndex].friends = currentUser.friends;
                        await saveData(data);
                    }
                    
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    document.getElementById('addFriendInput').value = '';
                    loadFriends();
                } else {
                    alert('Этот пользователь уже у вас в друзьях');
                }
            } else {
                alert('Пользователь не найден');
            }
        });

        async function loadFriends() {
            const data = await loadData();
            const friendsList = document.getElementById('friendsList');
            friendsList.innerHTML = '';
            
            const friends = currentUser.friends || [];
            
            if (friends.length > 0) {
                for (const friendId of friends) {
                    const friend = data.users.find(u => u.id === friendId);
                    
                    if (friend) {
                        friendsList.innerHTML += `
                            <div class="friend-card">
                                <img src="${friend.avatar || 'https://via.placeholder.com/150'}" alt="${friend.nickname}">
                                <h4>${friend.nickname}</h4>
                                <p>${friend.email}</p>
                                <div class="friend-actions">
                                    <button class="message-btn" onclick="openChatWith(${friend.id}, '${friend.nickname}')">Сообщение</button>
                                    <button onclick="viewProfile(${friend.id})">Профиль</button>
                                </div>
                            </div>
                        `;
                    }
                }
            } else {
                friendsList.innerHTML = '<p>У вас пока нет друзей</p>';
            }
        }

        // ========== ЧАТЫ ==========
        async function loadChats() {
            const data = await loadData();
            const chatsList = document.getElementById('chatsList');
            chatsList.innerHTML = '';
            
            const friends = currentUser.friends || [];
            
            if (friends.length > 0) {
                for (const friendId of friends) {
                    const friend = data.users.find(u => u.id === friendId);
                    
                    if (friend) {
                        const chatId = [currentUser.id, friendId].sort().join('_');
                        const chatMessages = data.messages[chatId] || [];
                        const lastMsg = chatMessages[chatMessages.length - 1];
                        const unreadCount = chatMessages.filter(m => !m.read && m.receiver === currentUser.id).length;
                        
                        const chatItem = document.createElement('div');
                        chatItem.className = `chat-item ${unreadCount > 0 ? 'has-unread' : ''}`;
                        chatItem.innerHTML = `
                            <div>
                                <strong>${friend.nickname}</strong>
                                <p style="font-size: 12px; color: var(--text-secondary);">
                                    ${lastMsg ? lastMsg.text.substring(0, 20) + (lastMsg.text.length > 20 ? '...' : '') : 'Нет сообщений'}
                                </p>
                            </div>
                            ${unreadCount > 0 ? `<span class="unread-badge">${unreadCount}</span>` : ''}
                        `;
                        chatItem.onclick = () => openChatWith(friend.id, friend.nickname);
                        chatsList.appendChild(chatItem);
                    }
                }
            } else {
                chatsList.innerHTML = '<p>Добавьте друзей чтобы начать чат</p>';
            }
        }

        window.openChatWith = function(userId, userNickname) {
            currentChatFriend = { id: userId, nickname: userNickname };
            const chatId = [currentUser.id, userId].sort().join('_');
            displayChat(chatId, userNickname);
        };

        async function displayChat(chatId, userNickname) {
            const data = await loadData();
            const chatMessages = data.messages[chatId] || [];
            const area = document.getElementById('messagesArea');
            area.innerHTML = '';
            
            chatMessages.sort((a, b) => a.id - b.id).forEach(msg => {
                const wrapper = document.createElement('div');
                wrapper.className = `message-wrapper ${msg.sender === currentUser.id ? 'sent' : 'received'}`;
                
                let statusHtml = '';
                if (msg.sender === currentUser.id) {
                    if (msg.read) {
                        statusHtml = '<span class="message-status"><i class="fas fa-check-double"></i></span>';
                    } else {
                        statusHtml = '<span class="message-status"><i class="fas fa-check grey"></i></span>';
                    }
                }
                
                wrapper.innerHTML = `
                    <div class="message ${msg.sender === currentUser.id ? 'sent' : 'received'}">
                        ${msg.text}
                        <button class="delete-message-btn" onclick="deleteMessage('${chatId}', ${msg.id})"><i class="fas fa-times"></i></button>
                    </div>
                    ${statusHtml}
                `;
                
                area.appendChild(wrapper);
            });
            
            area.scrollTop = area.scrollHeight;
        }

        window.deleteMessage = async function(chatId, messageId) {
            if (confirm('Удалить сообщение для всех?')) {
                const data = await loadData();
                data.messages[chatId] = data.messages[chatId].filter(m => m.id !== messageId);
                await saveData(data);
                displayChat(chatId, currentChatFriend.nickname);
            }
        };

        document.getElementById('sendMessageBtn').addEventListener('click', async function() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (text && currentChatFriend) {
                const data = await loadData();
                const chatId = [currentUser.id, currentChatFriend.id].sort().join('_');
                
                if (!data.messages[chatId]) {
                    data.messages[chatId] = [];
                }
                
                const newMsg = {
                    id: Date.now(),
                    text: text,
                    sender: currentUser.id,
                    receiver: currentChatFriend.id,
                    timestamp: new Date().toISOString(),
                    read: false
                };
                
                data.messages[chatId].push(newMsg);
                await saveData(data);
                
                input.value = '';
                displayChat(chatId, currentChatFriend.nickname);
                loadChats();
            }
        });

        // ========== ПОИСК ==========
        document.getElementById('searchInput').addEventListener('input', async function(e) {
            const query = e.target.value.toLowerCase();
            if (query.length < 2) return;
            
            const data = await loadData();
            const found = data.users.find(u => 
                u.nickname.toLowerCase().includes(query) && 
                u.id !== currentUser.id
            );
            
            if (found) {
                viewProfile(found.id);
            }
        });

        // ========== ПРОСМОТР ПРОФИЛЯ ==========
        window.viewProfile = async function(userId) {
            const data = await loadData();
            const user = data.users.find(u => u.id === userId);
            if (!user) return;
            
            const userPosts = data.posts.filter(p => p.userId === userId);
            
            const modal = document.createElement('div');
            modal.className = 'user-profile-modal';
            
            modal.innerHTML = `
                <div class="user-profile-content">
                    <button class="close-btn" onclick="this.closest('.user-profile-modal').remove()">&times;</button>
                    <div class="user-profile-header">
                        <img src="${user.avatar || 'https://via.placeholder.com/150'}" alt="${user.nickname}">
                        <div>
                            <h2>${user.nickname}</h2>
                            <p>${user.email}</p>
                            <button class="message-btn" onclick="openChatWith(${user.id}, '${user.nickname}'); this.closest('.user-profile-modal').remove()">
                                Написать сообщение
                            </button>
                        </div>
                    </div>
                    <h3>Публикации</h3>
                    <div class="user-posts">
                        ${userPosts.map(post => `
                            <div class="post-card">
                                ${post.type === 'video' ? `<video src="${post.media}" controls></video>` : `<img src="${post.media}" alt="Post">`}
                                <p>❤️ ${post.likes ? post.likes.length : 0} | 💬 ${post.comments ? post.comments.length : 0}</p>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
        };

        // ========== ПРОВЕРКА АВТОРИЗАЦИИ ==========
        const savedUser = localStorage.getItem('currentUser');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            showMainApp();
            loadUserData();
        }
    </script>
</body>
</html>
